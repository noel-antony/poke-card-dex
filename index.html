<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeDex</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="pokedex-container">
        <div class="top-bar">
            <div class="lens-blue"></div>
            <div class="lights-indicator">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
            </div>
        </div>

        <div id="search-box">
            <input type="text" id="pokemonInput" placeholder="Enter pokemon name or ID  ...">
            <button id="searchBtn" onclick="fetchPokemon()">SCAN</button>
        </div>

        <div class="pokedex-core">
            <button class="nav-btn" onclick="changePokemon('prev')">◀</button>
            
            <div id="screen-display">
                <div class="welcome-msg">
                    <p>Pokédex ready!</p>
                    <span>Search among 1000+ pokemons</span>
                </div>
            </div>

            <button class="nav-btn" onclick="changePokemon('next')">▶</button>
        </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
